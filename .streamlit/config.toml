[runner]
fastReruns = true

[client]
toolbarMode = "minimal"
gatherUsageStats = false

[server]
address = "0.0.0.0"
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 20

[theme]
# 위젯 포커스·선택에 쓰이는 색 — 붉은 primary는 세그먼트 등에서 글자가 묻힘; 대시보드 브라운으로 통일
primaryColor = "#8E6242"
backgroundColor = "#FAF9F6"
secondaryBackgroundColor = "#F2F0E6"
textColor = "#333333"
font = "serif"